name: Release

# Manually triggered: supply the version and changelog for this release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0 → tag v0.1.0)"
        required: true
        default: "0.1.0"
      notes:
        description: "What changed in this version"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace \
            -PappVersionName=${{ inputs.version }} \
            -PappVersionCode=${{ github.run_number }}

      - name: Stage APK
        run: cp app/build/outputs/apk/debug/app-debug.apk glyph-pomodoro-v${{ inputs.version }}.apk

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ inputs.version }}
          name: Glyph Pomodoro v${{ inputs.version }}
          body: ${{ inputs.notes }}
          files: glyph-pomodoro-v${{ inputs.version }}.apk
