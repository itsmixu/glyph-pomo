name: Build APK

# Manually triggered: run from the Actions tab (or `gh workflow run build.yml`).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Stage APK
        run: cp app/build/outputs/apk/debug/app-debug.apk glyph-pomodoro-${{ github.run_number }}.apk

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-${{ github.run_number }}
          name: Glyph Pomodoro build ${{ github.run_number }}
          body: |
            Automated debug build (run ${{ github.run_number }}, commit ${{ github.sha }}).
            Sideload: `adb install -r glyph-pomodoro-${{ github.run_number }}.apk`
          files: glyph-pomodoro-${{ github.run_number }}.apk
